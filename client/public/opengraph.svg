<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;family=Rajdhani:wght@600;700&amp;display=swap');
    </style>
    <radialGradient id="heroBg" cx="20%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#22c55e" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#0d111c" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="mockupClip">
      <rect x="700" y="60" width="460" height="510" rx="18"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="#0d111c"/>
  <rect width="1200" height="630" fill="url(#heroBg)"/>

  <!-- ── LEFT CONTENT ── -->

  <!-- Logo mark -->
  <rect x="56" y="52" width="36" height="36" rx="8" fill="#22c55e"/>
  <text x="74" y="76" text-anchor="middle" font-family="'Rajdhani',system-ui,sans-serif" font-size="20" font-weight="700" fill="#0d111c">S</text>
  <text x="102" y="78" font-family="'Rajdhani',system-ui,sans-serif" font-size="20" font-weight="700" fill="#f5f8fd" letter-spacing="-0.4">Swing Studio</text>

  <!-- Trust badge -->
  <rect x="56" y="112" width="330" height="30" rx="15" fill="#22c55e18" stroke="#22c55e30" stroke-width="1"/>
  <circle cx="76" cy="127" r="5" fill="#22c55e"/>
  <text x="92" y="132" font-family="'Inter',system-ui,sans-serif" font-size="12" font-weight="600" fill="#22c55e" letter-spacing="0.4">Trusted by players, parents &amp; pros</text>

  <!-- Headline line 1 -->
  <text x="56" y="242" font-family="'Rajdhani',system-ui,sans-serif" font-size="84" font-weight="700" fill="#f5f8fd" letter-spacing="-3">Your Swing.</text>

  <!-- Headline line 2 — green -->
  <text x="56" y="335" font-family="'Rajdhani',system-ui,sans-serif" font-size="84" font-weight="700" fill="#22c55e" letter-spacing="-3">Compared to</text>
  <text x="56" y="425" font-family="'Rajdhani',system-ui,sans-serif" font-size="84" font-weight="700" fill="#22c55e" letter-spacing="-3">the Best.</text>

  <!-- Sub text -->
  <text x="57" y="476" font-family="'Inter',system-ui,sans-serif" font-size="19" fill="#7b8ea8" letter-spacing="-0.2">Side-by-side analysis with MLB hitters.</text>
  <text x="57" y="502" font-family="'Inter',system-ui,sans-serif" font-size="19" fill="#7b8ea8" letter-spacing="-0.2">Free to start — no card required.</text>

  <!-- CTA pill -->
  <rect x="56" y="530" width="200" height="46" rx="10" fill="#22c55e"/>
  <text x="156" y="558" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="16" font-weight="700" fill="#0d111c" letter-spacing="-0.2">Analyze Free  →</text>

  <!-- Domain -->
  <text x="58" y="610" font-family="'Inter',system-ui,sans-serif" font-size="14" fill="#3d5068">swingstudio.ai</text>

  <!-- ── RIGHT: MOCKUP ── -->

  <!-- Mockup outer card -->
  <rect x="700" y="60" width="460" height="510" rx="18" fill="#141b2d" stroke="#202d47" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="700" y="60" width="460" height="44" rx="18" fill="#1a2338"/>
  <rect x="700" y="84" width="460" height="20" fill="#1a2338"/>
  <circle cx="728" cy="82" r="5.5" fill="#ef4444" opacity="0.55"/>
  <circle cx="748" cy="82" r="5.5" fill="#f59e0b" opacity="0.55"/>
  <circle cx="768" cy="82" r="5.5" fill="#22c55e" opacity="0.55"/>
  <rect x="810" y="73" width="190" height="18" rx="5" fill="#202d47"/>
  <text x="905" y="86" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#4a5e7a">swingstudio.ai/analysis</text>

  <!-- Split panels -->
  <rect x="700" y="104" width="229" height="26" fill="#0d111c"/>
  <rect x="929" y="104" width="231" height="26" fill="#0d111c"/>
  <line x1="929" y1="104" x2="929" y2="476" stroke="#202d47" stroke-width="1"/>

  <!-- Left panel label -->
  <text x="720" y="122" font-family="'Inter',system-ui,sans-serif" font-size="10" font-weight="600" fill="#22c55e">▸ Your Swing</text>

  <!-- Right panel label -->
  <text x="949" y="122" font-family="'Inter',system-ui,sans-serif" font-size="10" font-weight="600" fill="#a78bfa">▸ Shohei Ohtani · MLB</text>

  <!-- Left video area -->
  <rect x="710" y="132" width="210" height="290" rx="6" fill="#090d14" stroke="#1a2338" stroke-width="1"/>
  <!-- Play button green -->
  <circle cx="815" cy="277" r="34" fill="#22c55e18" stroke="#22c55e40" stroke-width="1.5"/>
  <polygon points="804,261 840,277 804,293" fill="#22c55e" opacity="0.85"/>
  <!-- Video label -->
  <text x="815" y="340" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="10" font-weight="600" fill="#f5f8fd">john_2025-04-01</text>
  <text x="815" y="352" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#7b8ea8">Full Swing · Uploaded</text>

  <!-- Left scrubber -->
  <rect x="710" y="422" width="219" height="32" fill="#1a2338"/>
  <rect x="720" y="430" width="199" height="3" rx="2" fill="#202d47"/>
  <rect x="720" y="430" width="76" height="3" rx="2" fill="#22c55e"/>
  <circle cx="796" cy="431" r="5" fill="#22c55e" stroke="#0d3320" stroke-width="1.5"/>
  <!-- Pills -->
  <rect x="720" y="440" width="36" height="14" rx="3" fill="#22c55e18"/>
  <text x="738" y="451" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#22c55e">0.5x</text>
  <rect x="762" y="440" width="58" height="14" rx="3" fill="#22c55e18"/>
  <text x="791" y="451" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#22c55e">frame 24</text>

  <!-- Right video area -->
  <rect x="939" y="132" width="210" height="290" rx="6" fill="#090d14" stroke="#1a2338" stroke-width="1"/>
  <!-- Play button purple -->
  <circle cx="1044" cy="277" r="34" fill="#a78bfa18" stroke="#a78bfa40" stroke-width="1.5"/>
  <polygon points="1033,261 1069,277 1033,293" fill="#a78bfa" opacity="0.85"/>
  <!-- Video label -->
  <text x="1044" y="340" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="10" font-weight="600" fill="#a78bfa">Shohei Ohtani</text>
  <text x="1044" y="352" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#7b8ea8">Full Swing · MLB Library</text>

  <!-- Right scrubber -->
  <rect x="929" y="422" width="231" height="32" fill="#1a2338"/>
  <rect x="939" y="430" width="211" height="3" rx="2" fill="#202d47"/>
  <rect x="939" y="430" width="80" height="3" rx="2" fill="#a78bfa"/>
  <circle cx="1019" cy="431" r="5" fill="#a78bfa" stroke="#2d1a5e" stroke-width="1.5"/>
  <!-- Synced pill -->
  <rect x="1090" y="440" width="48" height="14" rx="3" fill="#a78bfa18"/>
  <text x="1114" y="451" text-anchor="middle" font-family="ui-monospace,monospace" font-size="8" fill="#a78bfa">synced</text>

  <!-- Feature row at bottom of mockup -->
  <rect x="700" y="454" width="460" height="116" rx="0" fill="#1a2338"/>
  <line x1="700" y1="454" x2="1160" y2="454" stroke="#202d47" stroke-width="1"/>
  <line x1="853" y1="454" x2="853" y2="570" stroke="#202d47" stroke-width="1"/>
  <line x1="1006" y1="454" x2="1006" y2="570" stroke="#202d47" stroke-width="1"/>

  <!-- Bottom rounded corners fill -->
  <rect x="700" y="550" width="460" height="20" rx="0" fill="#1a2338"/>

  <!-- Feature: Biometrics -->
  <text x="776" y="492" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="600" fill="#f5f8fd">Biometrics</text>
  <text x="776" y="508" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#22c55e">MLB body comps</text>

  <!-- Feature: Blueprint -->
  <text x="929" y="492" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="600" fill="#f5f8fd">Blueprint</text>
  <text x="929" y="508" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#22c55e">Phase drills</text>

  <!-- Feature: Cognition -->
  <text x="1083" y="492" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="11" font-weight="600" fill="#f5f8fd">Cognition</text>
  <text x="1083" y="508" text-anchor="middle" font-family="'Inter',system-ui,sans-serif" font-size="9" fill="#22c55e">Vision training</text>

  <!-- Bottom accent line -->
  <rect x="0" y="626" width="1200" height="4" fill="#22c55e" opacity="0.35"/>
</svg>
