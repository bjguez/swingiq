<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="heroBg" cx="25%" cy="45%" r="65%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#09090b" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="blueText" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#60a5fa"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#18181b"/>
      <stop offset="100%" stop-color="#111113"/>
    </linearGradient>
    <clipPath id="mockupClip">
      <rect x="700" y="60" width="460" height="510" rx="18"/>
    </clipPath>
  </defs>

  <!-- Base background -->
  <rect width="1200" height="630" fill="#09090b"/>
  <rect width="1200" height="630" fill="url(#heroBg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="630" x2="1200" y2="630" stroke="#1e1e2e" stroke-width="1"/>

  <!-- ── LEFT CONTENT ── -->

  <!-- Logo mark -->
  <rect x="56" y="52" width="36" height="36" rx="8" fill="#1d4ed8"/>
  <text x="74" y="76" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="20" font-weight="800" fill="white">S</text>
  <text x="102" y="78" font-family="system-ui,-apple-system,sans-serif" font-size="19" font-weight="700" fill="#f8fafc" letter-spacing="-0.4">Swing Studio</text>

  <!-- Trust badge -->
  <rect x="56" y="112" width="390" height="30" rx="15" fill="#1d4ed812" stroke="#1d4ed835" stroke-width="1"/>
  <circle cx="78" cy="127" r="5" fill="#3b82f6"/>
  <text x="94" y="132" font-family="system-ui,-apple-system,sans-serif" font-size="12" font-weight="600" fill="#93c5fd" letter-spacing="0.6">Trusted by players, parents &amp; pros</text>

  <!-- Headline line 1 -->
  <text x="56" y="242" font-family="system-ui,-apple-system,sans-serif" font-size="80" font-weight="800" fill="#f8fafc" letter-spacing="-3.5">Your Swing.</text>

  <!-- Headline line 2 — blue gradient -->
  <text x="56" y="335" font-family="system-ui,-apple-system,sans-serif" font-size="80" font-weight="800" fill="url(#blueText)" letter-spacing="-3.5">Compared to</text>
  <text x="56" y="425" font-family="system-ui,-apple-system,sans-serif" font-size="80" font-weight="800" fill="url(#blueText)" letter-spacing="-3.5">the Best.</text>

  <!-- Sub text -->
  <text x="57" y="476" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#64748b" letter-spacing="-0.2">Side-by-side analysis with MLB hitters.</text>
  <text x="57" y="500" font-family="system-ui,-apple-system,sans-serif" font-size="20" fill="#64748b" letter-spacing="-0.2">Free to start — no card required.</text>

  <!-- CTA pill -->
  <rect x="56" y="530" width="215" height="46" rx="10" fill="#2563eb"/>
  <text x="163" y="558" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="16" font-weight="700" fill="white" letter-spacing="-0.2">Analyze Free  →</text>

  <!-- Domain -->
  <text x="58" y="610" font-family="system-ui,-apple-system,sans-serif" font-size="14" fill="#334155">swingstudio.ai</text>

  <!-- ── RIGHT: MOCKUP ── -->

  <!-- Mockup outer card -->
  <rect x="700" y="60" width="460" height="510" rx="18" fill="url(#cardGrad)" stroke="#27272a" stroke-width="1.5"/>

  <!-- Title bar -->
  <rect x="700" y="60" width="460" height="44" rx="18" fill="#1c1c1f"/>
  <rect x="700" y="84" width="460" height="20" fill="#1c1c1f"/>
  <circle cx="728" cy="82" r="5.5" fill="#ef4444" opacity="0.55"/>
  <circle cx="748" cy="82" r="5.5" fill="#f59e0b" opacity="0.55"/>
  <circle cx="768" cy="82" r="5.5" fill="#22c55e" opacity="0.55"/>
  <rect x="810" y="73" width="190" height="18" rx="5" fill="#27272a"/>
  <text x="905" y="86" text-anchor="middle" font-family="ui-monospace,monospace" font-size="9" fill="#52525b">swingstudio.ai/analysis</text>

