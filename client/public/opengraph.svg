  <rect x="700" y="104" width="229" height="26" fill="#111113"/>
  <rect x="929" y="104" width="231" height="26" fill="#111113"/>
  <line x1="929" y1="104" x2="929" y2="570" stroke="#27272a" stroke-width="1"/>

  <!-- Left panel label -->
  <rect x="714" y="109" width="100" height="18" rx="4" fill="#1d4ed820"/>
  <text x="720" y="122" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#60a5fa">Your Swing</text>

  <!-- Right panel label -->
  <rect x="943" y="109" width="155" height="18" rx="4" fill="#6d28d920"/>
  <text x="949" y="122" font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#a78bfa">Shohei Ohtani · MLB</text>

  <!-- Left video area -->
  <rect x="710" y="132" width="210" height="290" rx="6" fill="#0d0d10" stroke="#1e1e2e" stroke-width="1"/>
  <!-- Play button -->
  <circle cx="815" cy="277" r="34" fill="#1d4ed815" stroke="#1d4ed840" stroke-width="1.5"/>
  <polygon points="804,261 840,277 804,293" fill="#3b82f6" opacity="0.85"/>
  <!-- Speed badge -->
  <rect x="719" y="408" width="44" height="16" rx="3" fill="#1d4ed820"/>
  <text x="725" y="419" font-family="ui-monospace,monospace" font-size="9" fill="#60a5fa">0.5x</text>
  <rect x="769" y="408" width="62" height="16" rx="3" fill="#27272a"/>
  <text x="775" y="419" font-family="ui-monospace,monospace" font-size="9" fill="#52525b">frame  24</text>

  <!-- Right video area -->
  <rect x="939" y="132" width="210" height="290" rx="6" fill="#0d0d10" stroke="#1e1e2e" stroke-width="1"/>
  <!-- Play button -->
  <circle cx="1044" cy="277" r="34" fill="#6d28d915" stroke="#6d28d940" stroke-width="1.5"/>
  <polygon points="1033,261 1069,277 1033,293" fill="#a78bfa" opacity="0.85"/>
  <!-- Synced badge -->
  <rect x="1090" y="408" width="48" height="16" rx="3" fill="#6d28d920"/>
  <text x="1096" y="419" font-family="ui-monospace,monospace" font-size="9" fill="#a78bfa">synced</text>

  <!-- Scrubber bar -->
  <rect x="710" y="434" width="440" height="42" fill="#0f0f12" rx="0"/>
  <rect x="724" y="450" width="412" height="4" rx="2" fill="#27272a"/>
  <rect x="724" y="450" width="160" height="4" rx="2" fill="#2563eb"/>
  <circle cx="884" cy="452" r="8" fill="#2563eb" stroke="#1e3a8a" stroke-width="2"/>

  <!-- Tool pills -->
  <rect x="724" y="463" width="36" height="14" rx="3" fill="#1d4ed818"/>
  <text x="742" y="474" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#60a5fa">Draw</text>
  <rect x="766" y="463" width="36" height="14" rx="3" fill="#1d4ed818"/>
  <text x="784" y="474" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#60a5fa">Sync</text>
  <rect x="808" y="463" width="50" height="14" rx="3" fill="#1d4ed818"/>
  <text x="833" y="474" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#60a5fa">Slow Mo</text>
  <rect x="864" y="463" width="42" height="14" rx="3" fill="#1d4ed818"/>
  <text x="885" y="474" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#60a5fa">Angle</text>

  <!-- Feature row at bottom of mockup -->
  <rect x="700" y="476" width="460" height="94" rx="0" fill="#0c0c0f"/>
  <rect x="700" y="554" width="460" height="16" rx="0" fill="#0c0c0f"/>
  <line x1="700" y1="476" x2="1160" y2="476" stroke="#1e1e2e" stroke-width="1"/>

  <!-- Feature pills at bottom -->
  <rect x="714" y="490" width="120" height="40" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="774" y="507" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#94a3b8">Biometrics</text>
  <text x="774" y="521" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#3b82f6">MLB comps</text>

  <rect x="844" y="490" width="120" height="40" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="904" y="507" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#94a3b8">Blueprint</text>
  <text x="904" y="521" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#3b82f6">Phase drills</text>

  <rect x="974" y="490" width="120" height="40" rx="8" fill="#18181b" stroke="#27272a" stroke-width="1"/>
  <text x="1034" y="507" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" font-weight="600" fill="#94a3b8">Cognition</text>
  <text x="1034" y="521" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="#3b82f6">Vision training</text>

  <!-- Bottom border line -->
  <rect x="0" y="628" width="1200" height="2" fill="#1d4ed8" opacity="0.4"/>
</svg>
